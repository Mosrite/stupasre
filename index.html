function derive(p) {
  const tot  = p.km + p.nk;
  const opex = p.hg + p.gs + p.ox;
  const mort = p.zi + p.ti;
  const gp   = tot - opex;    // Warmmiete minus operating costs (pre-financing surplus)
  const np   = gp - mort;     // = tot - opex - mort = cf
  const cf   = tot - opex - mort;
  const tr   = cf + p.ti;
  return { ...p, tot, opex, mort, gp, np, cf, tr,
    gmPct: gp/tot*100,   // gross margin on total income (Warmmiete)
    nmPct: np/tot*100,   // net margin on total income
    yield: p.pp ? p.km*12/p.pp*100 : null,
    dscr:  gp/mort,      // NOI (gp) / debt service — standard RE DSCR
    ptr:   p.pp ? p.pp/(p.km*12) : null,
    ppSqm: (p.pp && p.size) ? Math.round(p.pp / p.size) : null,
    kmSqm: p.size ? +(p.km / p.size).toFixed(2) : null };
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
const f  = (v,d=0) => v===null||v===undefined ? '—'
  : new Intl.NumberFormat('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d}).format(v);
const fe = (v,d=0) => v===null ? '—' : '€\u202f'+f(v,d);
const fp = (v,d=1) => v===null ? '—' : f(v,d)+'\u202f%';
const fs = (v) => {  // short for axes
  const av = Math.abs(v);
  if (av >= 1000) return (v/1000).toFixed(1)+'k';
  return Math.round(v).toString();
};
const vc = (v) => v===null ? '#9ca3af' : v>=0 ? '#34d399' : '#f87171';
const bc = (v) => v>=0 ? '#34d399' : '#f87171';

// ─── SVG CHART ENGINE ───────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, text) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  if (text !== undefined) e.textContent = text;
  return e;
}

function makeChart({ data, W=480, H=210, ml=56, mr=14, mt=16, mb=36, unit='€', label='' }) {
  // data: [{name, bars:[{label,value,color}]}]
  const iW = W-ml-mr, iH = H-mt-mb;

  // Find value range
  const allVals = data.flatMap(d =>
    [ d.bars.filter(b=>b.value>0).reduce((s,b)=>s+b.value,0),
      d.bars.filter(b=>b.value<0).reduce((s,b)=>s+b.value,0) ]);
  const maxV = Math.max(0,...allVals);
  const minV = Math.min(0,...allVals);
  const range = maxV - minV || 1;

  const yPx = v => mt + (1-(v-minV)/range)*iH;
  const zeroY = yPx(0);
  const groupW = iW / data.length;
  const barW = Math.min(groupW*0.62, 56);

  const svg = el('svg', {viewBox:`0 0 ${W} ${H}`, width:'100%', style:'overflow:visible;display:block'});

  // Grid lines + y-axis labels
  const ticks = 5;
  for (let i=0; i<=ticks; i++) {
    const v = minV + (range/ticks)*i;
    const y = yPx(v);
    svg.appendChild(el('line', {x1:ml,y1:y,x2:W-mr,y2:y,stroke:'#374151','stroke-dasharray':'3,3'}));
    svg.appendChild(el('text', {x:ml-5,y:y+3,'text-anchor':'end',fill:'#9ca3af','font-size':'9'}, fs(v)));
  }

  // Zero line
  svg.appendChild(el('line', {x1:ml,y1:zeroY,x2:W-mr,y2:zeroY,stroke:'#6b7280','stroke-width':'1.5'}));

  // Bars
  data.forEach((d, i) => {
    const cx = ml + groupW*(i+0.5);
    let posTop = zeroY, negBot = zeroY;

    d.bars.forEach(b => {
      if (b.value === 0) return;
      const h = Math.abs(b.value/range*iH);
      const y = b.value>=0 ? posTop-h : negBot;
      const rect = el('rect', {x:cx-barW/2, y, width:barW, height:h, fill:b.color, rx:'2'});
      const title = document.createElementNS(NS,'title');
      title.textContent = `${b.label||d.name}: ${unit}${f(b.value)}`;
      rect.appendChild(title);
      // Hover tooltip
      rect.addEventListener('mouseenter', function(e) {
        showTooltip(e, `<b>${d.name}</b><br/>${b.label}: ${unit}${f(b.value)}`);
      });
      rect.addEventListener('mousemove', moveTooltip);
      rect.addEventListener('mouseleave', hideTooltip);
      svg.appendChild(rect);
      if (b.value>=0) posTop-=h; else negBot+=h;
    });

    // X label
    svg.appendChild(el('text', {x:cx, y:H-mb+14,'text-anchor':'middle',fill:'#9ca3af','font-size':'10'}, d.name));
  });

  // Y-axis label
  if (label) {
    const t = el('text', {x:8, y:mt+iH/2, 'text-anchor':'middle', fill:'#6b7280','font-size':'9',
      transform:`rotate(-90,8,${mt+iH/2})`}, label);
    svg.appendChild(t);
  }

  return svg;
}

// Grouped bar chart (multiple bars side by side per group)
function makeGroupedChart({ data, keys, colors, colorFns, W=480, H=210, ml=56, mr=14, mt=16, mb=36, unit='' }) {
  const iW = W-ml-mr, iH = H-mt-mb;
  const allVals = data.flatMap(d => keys.map(k => d[k]||0));
  const maxV = Math.max(0,...allVals);
  const minV = Math.min(0,...allVals);
  const range = maxV - minV || 1;
  const yPx = v => mt + (1-(v-minV)/range)*iH;
  const zeroY = yPx(0);
  const groupW = iW / data.length;
  const bw = Math.min(groupW*0.75/keys.length, 40);
  const gap = bw*0.25;

  const svg = el('svg', {viewBox:`0 0 ${W} ${H}`, width:'100%', style:'overflow:visible;display:block'});

  // Grid + labels
  for (let i=0; i<=5; i++) {
    const v = minV + (range/5)*i;
    const y = yPx(v);
    svg.appendChild(el('line', {x1:ml,y1:y,x2:W-mr,y2:y,stroke:'#374151','stroke-dasharray':'3,3'}));
    svg.appendChild(el('text', {x:ml-5,y:y+3,'text-anchor':'end',fill:'#9ca3af','font-size':'9'}, fs(v)+(unit?unit:'')));
  }
  svg.appendChild(el('line', {x1:ml,y1:zeroY,x2:W-mr,y2:zeroY,stroke:'#6b7280','stroke-width':'1.5'}));

  // Reference line DSCR=1
  if (unit==='x') {
    const ry = yPx(1);
    svg.appendChild(el('line', {x1:ml,y1:ry,x2:W-mr,y2:ry,stroke:'#fbbf24','stroke-width':'1',
      'stroke-dasharray':'5,3'}));
    svg.appendChild(el('text', {x:W-mr+2,y:ry+3,fill:'#fbbf24','font-size':'8'}, '1.0'));
  }

  data.forEach((d, i) => {
    const cx = ml + groupW*(i+0.5) - (keys.length-1)*(bw+gap)/2;
    keys.forEach((k, ki) => {
      const v = d[k] !== undefined ? d[k] : 0;
      if (v===0) return;
      const h = Math.abs(v/range*iH);
      const y = v>=0 ? zeroY-h : zeroY;
      const x = cx + ki*(bw+gap) - bw/2;
      // colorFns[ki] allows per-value color (e.g. green/red by sign); falls back to colors[ki]
      const fill = (colorFns && colorFns[ki]) ? colorFns[ki](v) : (colors[ki]||'#60a5fa');
      const rect = el('rect', {x, y, width:bw, height:h, fill, rx:'2'});
      rect.addEventListener('mouseenter', e => showTooltip(e, `<b>${d.name}</b><br/>${k}: ${f(v,2)}${unit}`));
      rect.addEventListener('mousemove', moveTooltip);
      rect.addEventListener('mouseleave', hideTooltip);
      svg.appendChild(rect);
    });
    svg.appendChild(el('text', {x:ml+groupW*(i+0.5),y:H-mb+14,'text-anchor':'middle',fill:'#9ca3af','font-size':'10'}, d.name));
  });
  return svg;
}

// Line chart for time-series data (market value development)
function makeLineChart({ series, W=900, H=260, ml=72, mr=130, mt=20, mb=36, unit='€' }) {
  const iW = W-ml-mr, iH = H-mt-mb;
  const allX = series.flatMap(s => s.points.map(p => p.x));
  const allY = series.flatMap(s => s.points.map(p => p.y));
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const minY = 0, maxY = Math.max(...allY) * 1.05;
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
  const xPx = x => ml + (x - minX) / rangeX * iW;
  const yPx = y => mt + (1 - (y - minY) / rangeY) * iH;

  const svg = el('svg', {viewBox:`0 0 ${W} ${H}`, width:'100%', style:'overflow:visible;display:block'});

  // Grid + Y labels
  const ticks = 5;
  for (let i = 0; i <= ticks; i++) {
    const v = minY + (maxY - minY) / ticks * i;
    const py = yPx(v);
    svg.appendChild(el('line', {x1:ml,y1:py,x2:W-mr,y2:py,stroke:'#374151','stroke-dasharray':'3,3'}));
    svg.appendChild(el('text', {x:ml-5,y:py+3,'text-anchor':'end',fill:'#9ca3af','font-size':'9'}, fs(v)));
  }

  // Vertical year lines + X labels
  for (let x = minX; x <= maxX; x++) {
    const px = xPx(x);
    svg.appendChild(el('line', {x1:px,y1:mt,x2:px,y2:H-mb,stroke:'#374151','stroke-dasharray':'2,4'}));
    svg.appendChild(el('text', {x:px,y:H-mb+12,'text-anchor':'middle',fill:'#9ca3af','font-size':'9'}, x));
  }

  // "Now" marker (April 2026)
  const NOW_X = 2026 + 3/12;
  const nowPx = xPx(NOW_X);
  svg.appendChild(el('line', {x1:nowPx,y1:mt,x2:nowPx,y2:H-mb,stroke:'#fbbf24','stroke-width':'1.5','stroke-dasharray':'5,3'}));
  svg.appendChild(el('text', {x:nowPx+3,y:mt+9,fill:'#fbbf24','font-size':'8'}, 'Apr 2026'));

  // Draw each series
  series.forEach(s => {
    const pts = s.points;
    for (let i = 0; i < pts.length - 1; i++) {
      const p1 = pts[i], p2 = pts[i+1];
      const attrs = {
        x1: xPx(p1.x), y1: yPx(p1.y), x2: xPx(p2.x), y2: yPx(p2.y),
        stroke: s.color, 'stroke-width': s.thick ? '2.5' : '1.5',
      };
      if (p2.projected) attrs['stroke-dasharray'] = '6,3';
      svg.appendChild(el('line', attrs));
    }
    // Dots
    pts.forEach(p => {
      const c = el('circle', {cx:xPx(p.x), cy:yPx(p.y), r: s.thick?'4':'3',
        fill:s.color, opacity:p.projected?'0.7':'1'});
      c.addEventListener('mouseenter', e => showTooltip(e,
        `<b>${s.name}</b><br/>${p.x}: ${unit}${f(p.y)}${p.projected?' <span style="color:#fbbf24">(projected)</span>':''}`));
      c.addEventListener('mousemove', moveTooltip);
      c.addEventListener('mouseleave', hideTooltip);
      svg.appendChild(c);
    });
    // End label
    if (pts.length > 0) {
      const last = pts[pts.length-1];
      svg.appendChild(el('text', {x:xPx(last.x)+5, y:yPx(last.y)+3,
        fill:s.color, 'font-size': s.thick?'10':'9', 'font-weight': s.thick?'700':'400'}, s.name));
    }
  });

  return svg;
}

// Waterfall / bridge chart — each bar floats from running total of previous bars
function makeWaterfallChart({ steps, W=420, H=280, ml=64, mr=14, mt=20, mb=68 }) {
  const iW=W-ml-mr, iH=H-mt-mb;
  // Build bars with start/end positions
  let run=0;
  const bars=steps.map(s=>{
    const s0=s.isTotal?0:run;
    const s1=s.isTotal?s.value:run+s.value;
    if(!s.isTotal) run+=s.value;
    return{...s,s0,s1};
  });
  const allV=bars.flatMap(b=>[b.s0,b.s1]);
  const rawMax=Math.max(0,...allV), rawMin=Math.min(0,...allV);
  const pad=(rawMax-rawMin)*0.14;
  const maxV=rawMax+pad, minV=rawMin-pad;
  const range=maxV-minV||1;
  const yPx=v=>mt+(1-(v-minV)/range)*iH;
  const z=yPx(0);
  const gW=iW/bars.length, bW=Math.min(gW*0.62,44);
  const svg=el('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',style:'overflow:visible;display:block'});
  // Grid
  for(let i=0;i<=5;i++){
    const v=minV+(range/5)*i, y=yPx(v);
    svg.appendChild(el('line',{x1:ml,y1:y,x2:W-mr,y2:y,stroke:'#374151','stroke-dasharray':'3,3'}));
    svg.appendChild(el('text',{x:ml-5,y:y+3,'text-anchor':'end',fill:'#9ca3af','font-size':'9'},fs(v)));
  }
  if(minV<0&&maxV>0) svg.appendChild(el('line',{x1:ml,y1:z,x2:W-mr,y2:z,stroke:'#6b7280','stroke-width':'1.5'}));
  bars.forEach((b,i)=>{
    const cx=ml+gW*(i+0.5), x=cx-bW/2;
    const top=yPx(Math.max(b.s0,b.s1)), bot=yPx(Math.min(b.s0,b.s1)), h=Math.max(2,bot-top);
    const fill=b.isTotal?(b.value>=0?'#34d399':'#f87171'):(b.color||(b.value>=0?'#34d399':'#dc2626'));
    // Connector line to next bar
    if(i<bars.length-1){
      const nCx=ml+gW*(i+1.5);
      svg.appendChild(el('line',{x1:cx+bW/2,y1:yPx(b.s1),x2:nCx-bW/2,y2:yPx(b.s1),
        stroke:'#4b5563','stroke-width':'1','stroke-dasharray':'3,2'}));
    }
    const rect=el('rect',{x,y:top,width:bW,height:h,fill,rx:'2',opacity:'0.9'});
    rect.addEventListener('mouseenter',e=>showTooltip(e,`<b>${b.label}</b><br/>€${f(b.value)}`));
    rect.addEventListener('mousemove',moveTooltip);
    rect.addEventListener('mouseleave',hideTooltip);
    svg.appendChild(rect);
    // Value label above/below bar
    const lv=b.value>=0?top-3:bot+10;
    svg.appendChild(el('text',{x:cx,y:lv,'text-anchor':'middle',fill:fill,
      'font-size':'9','font-weight':'600'},fs(b.value)));
    // Rotated x-axis label
    svg.appendChild(el('text',{x:cx,y:H-mb+12,'text-anchor':'end',fill:'#9ca3af','font-size':'9',
      transform:`rotate(-40,${cx},${H-mb+12})`},b.label));
  });
  return svg;
}

// Helper: decimal year fraction → "Mon YYYY"
function formatFrac(frac) {
  const yr = Math.floor(frac);
  const mo = Math.round((frac - yr) * 12) + 1;
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][Math.min(mo-1,11)]+' '+yr;
}

const EQUITY_PAID = {berlin:16000,eschweiler:0,huegelstr:0,ohmstr:0,leipzig:7000,'_portfolio':23000};

// Recompute break-even year from adjusted pts array and baseline (used as initial deficit)
function recomputeBE(pts, knk) {
  let prevFrac = pts[0].y, prevCum = -knk;
  for (const p of pts) {
    const frac = p.y + 1;
    if (prevCum < 0 && p.cum >= 0) {
      const t = (-prevCum) / (p.cum - prevCum);
      return prevFrac + t * (frac - prevFrac);
    }
    prevFrac = frac; prevCum = p.cum;
  }
  return null;
}

// BE_TILT_MODEL: cum += cumulative tilgung through each year-end.
// Tilgung counts as return (equity build). Break-even moves earlier.
const BE_TILT_MODEL = (() => {
  const out = {};
  ['berlin','eschweiler','huegelstr','ohmstr','leipzig','_portfolio'].forEach(id => {
    const bm = BE_MODEL[id];
    const ty = TILGUNG_BY_YEAR[id] || {};
    let cumT = 0;
    const pts = bm.pts.map(p => { cumT += (ty[p.y]||0); return {y:p.y, cum:p.cum+cumT}; });
    out[id] = {knk:bm.knk, be:recomputeBE(pts,bm.knk), pts};
  });
  return out;
})();

// BE_TOTAL_MODEL: further subtracts equity paid in from each cum value.
// model.knk = KNK + equity (chart start point = −(KNK+equity)).
// totalCapital = KNK + cumRepairs + equity (used in detail table).
const BE_TOTAL_MODEL = (() => {
  const out = {};
  ['berlin','eschweiler','huegelstr','ohmstr','leipzig','_portfolio'].forEach(id => {
    const tilt = BE_TILT_MODEL[id];
    const eq = EQUITY_PAID[id] || 0;
    const pts = tilt.pts.map(p => ({y:p.y, cum:p.cum-eq}));
    const knk = tilt.knk + eq;
    const cr = id==='_portfolio'
      ? Object.keys(REPAIRS).reduce((s,k)=>(s+(REPAIRS[k]||[]).reduce((s2,r)=>s2+(r.amt||0),0)),0)
      : (REPAIRS[id]||[]).reduce((s,r)=>s+(r.amt||0),0);
    out[id] = {knk, totalCapital:tilt.knk+cr+eq, be:recomputeBE(pts,knk), pts};
  });
  return out;
})();

// Decimal-year fraction → linearly interpolated cumulative (between year-end points).
// Each pts[k] represents end-of-year-y_k. We treat (y_k+1, cum_k) as an anchor in time.
function beCumAtFrac(model, frac) {
  const pts = model.pts;
  if (!pts.length) return null;
  // Anchor: at start-of-first-year (frac = pts[0].y), cumulative = -KNK (before any Op CF).
  // At end-of-year y_k (frac = y_k + 1), cumulative = pts[k].cum.
  const startFrac = pts[0].y;
  if (frac <= startFrac) return -model.knk;
  // Build piecewise list of (frac, cum)
  let prevFrac = startFrac, prevCum = -model.knk;
  for (const p of pts) {
    const endFrac = p.y + 1;
    if (frac <= endFrac) {
      const t = (frac - prevFrac) / (endFrac - prevFrac);
      return prevCum + t * (p.cum - prevCum);
    }
    prevFrac = endFrac;
    prevCum = p.cum;
  }
  return prevCum; // beyond last point
}

// Cash-flow-aware break-even timeline chart.
// Each line is the per-property cumulative position (Op CF excl. Tilgung minus KNK)
// over time. Solid through end-2025 (historical), dashed from 2026 (projected).
// items: [{id, name, color, model:{knk, be, pts}}]
function makeBreakEvenChart({ items, W=900, H=380, ml=72, mr=148, mt=24, mb=38, xMin=null, xMax=null }) {
  const iW=W-ml-mr, iH=H-mt-mb;
  const nowFrac = 2026 + 3/12;
  const histEndFrac = 2026; // end-of-2025 = historical/projected boundary

  // X range (caller may override for cross-chart alignment)
  const minX = xMin !== null ? xMin : Math.floor(Math.min(...items.map(it => it.model.pts[0].y)));
  const validBE = items.filter(it => it.model.be != null && it.model.be < 2060).map(it => it.model.be);
  const maxBE = validBE.length ? Math.max(...validBE) : nowFrac;
  const maxX = xMax !== null ? xMax : Math.ceil(Math.max(maxBE, nowFrac) + 1.5);

  // Y range (per-property only — exclude portfolio, which we do not plot in main chart)
  const allCums = items.flatMap(it => it.model.pts.filter(p => p.y <= maxX).map(p => p.cum));
  const minKNK = Math.min(...items.map(it => it.model.knk));
  const maxKNK = Math.max(...items.map(it => it.model.knk));
  const minCum = Math.min(-maxKNK, ...allCums);
  const maxCum = Math.max(...allCums, maxKNK * 0.15);
  // Cap Y range at the value reached at maxBE+1 to keep the chart readable
  const yCap = items.reduce((m,it) => {
    const v = beCumAtFrac(it.model, maxX);
    return Math.max(m, v);
  }, 0);
  const minY = minCum * 1.08;
  const maxY = Math.max(yCap * 1.1, maxKNK * 0.2, 5000);
  const rangeY = maxY - minY;

  const xPx = x => ml + (x - minX) / (maxX - minX) * iW;
  const yPx = y => mt + (1 - (y - minY) / rangeY) * iH;
  const zeroY = yPx(0);
  const histPx = xPx(histEndFrac);

  const svg = el('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',style:'overflow:visible;display:block'});

  // Y grid
  const yStep = Math.ceil(maxKNK / 4 / 5000) * 5000 || 5000;
  for(let v = Math.ceil(minY/yStep)*yStep; v <= maxY + yStep/2; v += yStep){
    const py = yPx(v);
    if(py < mt-2 || py > H-mb+2) continue;
    svg.appendChild(el('line',{x1:ml,y1:py,x2:W-mr,y2:py,stroke:'#374151','stroke-dasharray':'3,3'}));
    svg.appendChild(el('text',{x:ml-5,y:py+3,'text-anchor':'end',fill:'#9ca3af','font-size':'9'},fs(v)));
  }

  // Break-even (y=0) line
  svg.appendChild(el('line',{x1:ml,y1:zeroY,x2:W-mr,y2:zeroY,stroke:'#34d399','stroke-width':'1.5'}));
  svg.appendChild(el('text',{x:ml-5,y:zeroY-4,'text-anchor':'end',fill:'#34d399','font-size':'8','font-weight':'600'},'Break-even'));

  // X year ticks
  const span = maxX - minX;
  for(let yr=minX; yr<=maxX; yr++){
    const px = xPx(yr);
    svg.appendChild(el('line',{x1:px,y1:mt,x2:px,y2:H-mb,stroke:'#374151','stroke-dasharray':'2,4'}));
    if(span <= 12 || yr % 2 === 0){
      svg.appendChild(el('text',{x:px,y:H-mb+13,'text-anchor':'middle',fill:'#9ca3af','font-size':'9'},yr));
    }
  }

  // Historical/forecast boundary marker (end of 2025)
  if (histPx >= ml && histPx <= W-mr) {
    svg.appendChild(el('line',{x1:histPx,y1:mt,x2:histPx,y2:H-mb,stroke:'#6b7280','stroke-width':'1','stroke-dasharray':'3,3'}));
    svg.appendChild(el('text',{x:histPx-3,y:mt+9,'text-anchor':'end',fill:'#9ca3af','font-size':'8'},'Hist.'));
    svg.appendChild(el('text',{x:histPx+3,y:mt+9,fill:'#9ca3af','font-size':'8'},'Forecast'));
  }

  // "Now" vertical marker (Apr 2026)
  const nowPx = xPx(nowFrac);
  svg.appendChild(el('line',{x1:nowPx,y1:mt,x2:nowPx,y2:H-mb,stroke:'#fbbf24','stroke-width':'1.5','stroke-dasharray':'5,3'}));
  svg.appendChild(el('text',{x:nowPx+3,y:mt+19,fill:'#fbbf24','font-size':'8'},'Apr 2026'));

  // Per-property piecewise-linear curves
  items.forEach((it, idx) => {
    const { color, name, model } = it;
    // Build polyline points in time-order: start at (firstPt.y, -knk), then each (y+1, cum)
    const polyPts = [];
    polyPts.push({ frac: model.pts[0].y, cum: -model.knk });
    model.pts.forEach(p => {
      if (p.y + 1 <= maxX + 0.01) polyPts.push({ frac: p.y + 1, cum: p.cum });
    });

    // Split into solid (≤ histEndFrac) and dashed (> histEndFrac) at the boundary.
    const solidPts = [], dashedPts = [];
    for (let i = 0; i < polyPts.length; i++) {
      const p = polyPts[i];
      if (p.frac <= histEndFrac + 1e-6) {
        solidPts.push(p);
      } else {
        dashedPts.push(p);
      }
    }
    // If we have a solid run that ends before the boundary AND a dashed run starting after, splice in the boundary point.
    if (solidPts.length && dashedPts.length) {
      const last = solidPts[solidPts.length - 1];
      const next = dashedPts[0];
      if (last.frac < histEndFrac && next.frac > histEndFrac) {
        const t = (histEndFrac - last.frac) / (next.frac - last.frac);
        const boundaryCum = last.cum + t * (next.cum - last.cum);
        const boundaryPt = { frac: histEndFrac, cum: boundaryCum };
        solidPts.push(boundaryPt);
        dashedPts.unshift(boundaryPt);
      }
    }

    const toPath = pts => pts.map((p,i) => (i===0?'M':'L')+xPx(p.frac).toFixed(2)+','+yPx(p.cum).toFixed(2)).join(' ');

    if (solidPts.length >= 2) {
      svg.appendChild(el('path',{d:toPath(solidPts), stroke:color, 'stroke-width':'2.5', fill:'none'}));
    }
    if (dashedPts.length >= 2) {
      svg.appendChild(el('path',{d:toPath(dashedPts), stroke:color, 'stroke-width':'1.8', 'stroke-dasharray':'6,3', fill:'none'}));
    }

    // Break-even crossing dot
    if (model.be != null && model.be <= maxX + 0.5) {
      const beX = xPx(model.be);
      const beDot = el('circle',{cx:beX,cy:zeroY,r:'5',fill:color,stroke:'#111827','stroke-width':'1.5'});
      const beLabel = model.be <= histEndFrac ? `Broke even: <b>${formatFrac(model.be)}</b> ✓` : `Break-even: <b>${formatFrac(model.be)}</b>`;
      beDot.addEventListener('mouseenter',e=>showTooltip(e,
        `<b>${name}</b><br/>${beLabel}<br/>KNK: ${fe(Math.round(model.knk))}`));
      beDot.addEventListener('mousemove',moveTooltip);
      beDot.addEventListener('mouseleave',hideTooltip);
      svg.appendChild(beDot);
    }

    // Now-position dot (Apr 2026) on actual curve
    const nowCum = beCumAtFrac(model, nowFrac);
    const nowY = yPx(nowCum);
    const nowDot = el('circle',{cx:nowPx,cy:nowY,r:'3.5',fill:color,stroke:'#111827','stroke-width':'1.2'});
    const relPos = nowCum;
    const pct = Math.max(0, Math.min(100, 100 * (1 + nowCum / model.knk)));
    nowDot.addEventListener('mouseenter',e=>showTooltip(e,
      `<b>${name}</b><br/>Apr 2026: ${relPos>=0?'+':''}${fe(Math.round(relPos))} vs. break-even<br/>KNK: ${fe(Math.round(model.knk))}<br/>Progress: ${pct.toFixed(0)}%`));
    nowDot.addEventListener('mousemove',moveTooltip);
    nowDot.addEventListener('mouseleave',hideTooltip);
    svg.appendChild(nowDot);

    // Start dot at purchase year (-KNK)
    svg.appendChild(el('circle',{cx:xPx(model.pts[0].y),cy:yPx(-model.knk),r:'3',fill:color,stroke:'#111827','stroke-width':'1',opacity:'0.7'}));

    // Legend
    const legY = mt + 20 + idx * 26;
    svg.appendChild(el('rect',{x:W-mr+10,y:legY-9,width:14,height:10,fill:color,rx:'2'}));
    const ln1 = el('text',{x:W-mr+28,y:legY,fill:'#d1d5db','font-size':'10'});
    ln1.textContent = name;
    svg.appendChild(ln1);
    const ln2 = el('text',{x:W-mr+28,y:legY+11,fill:'#6b7280','font-size':'9'});
    ln2.textContent = (model.be != null && model.be <= histEndFrac) ? 'Done ✓ '+formatFrac(model.be)
      : (model.be != null && model.be <= maxX + 0.5) ? formatFrac(model.be) : '>'+maxX;
    svg.appendChild(ln2);
  });

  return svg;
}

// ─── TOOLTIP ────────────────────────────────────────────────────────────────
const TT = document.getElementById('tooltip');
function showTooltip(e, html) { TT.innerHTML=html; TT.style.display='block'; moveTooltip(e); }
function moveTooltip(e) {
  const r = document.body.getBoundingClientRect();
  TT.style.left = (e.clientX - r.left + 12)+'px';
  TT.style.top  = (e.clientY - r.top  - 8)+'px';
}
function hideTooltip() { TT.style.display='none'; }
function showKNKDetailTooltip(e, id) {
  const items = KNK_DETAIL[id] || [];
  const rows = items.map(t => `${t.category} (${t.party}), ${t.date}: <b>${fe(t.amount,2)}</b>`).join('<br/>');
  const total = items.reduce((s,t)=>s+t.amount,0);
  showTooltip(e, `<b>KNK — ${id.charAt(0).toUpperCase()+id.slice(1)} Breakdown</b><br/>${rows}<br/><hr style="border-color:#374151;margin:4px 0"/><b>Total: ${fe(total,2)}</b>`);
}
function showRepairDetailTooltip(e, id, year) {
  const all = REPAIRS_DETAIL[id] || [];
  const items = year ? all.filter(t => parseInt(t.date.slice(-4)) === year) : all;
  if (!items.length) return;
  const rows = items.map(t => `${t.desc} (${t.party}), ${t.date}: <b>${fe(t.amount,2)}</b>`).join('<br/>');
  const total = items.reduce((s,t)=>s+t.amount,0);
  const name = id.charAt(0).toUpperCase()+id.slice(1);
  const hdr = year ? `${name} ${year}` : name;
  showTooltip(e, `<b>Repair &amp; Maintenance — ${hdr} (invoices on file)</b><br/>${rows}<br/><hr style="border-color:#374151;margin:4px 0"/><b>Total invoiced: ${fe(total,2)}</b><br/><span style="color:#6b7280;font-size:10px">CSV accounting total may differ</span>`);
}

  return `<div class="card">

    <div class="card-value${sm?' sm':''}" style="color:${color}">${value}</div>
    ${sub ? `<div class="card-sub">${sub}</div>` : ''}
  </div>`;
}

}

// ─── MARKET VALUE TAB ────────────────────────────────────────────────────────
function renderMarketValue() {
  const sec = document.getElementById('market-value');

  const NOW_FRAC = 2026 + 3/12; // April 2026

  function getValueAtYear(d, year) {
    const md = MORTGAGE_DATA[d.id];
    const mv = MARKET_DATA[d.id];
    const py = parseInt(md.purchaseDate.substring(0,4));
    const pm = parseInt(md.purchaseDate.substring(5,7));
    const purchaseFrac = py + (pm-1)/12;
    if (year < purchaseFrac) return null;
    return d.pp * Math.pow(1 + mv.annualPct/100, year - purchaseFrac);
  }

  const currentVals = D.map(d => {
    const cv = getValueAtYear(d, NOW_FRAC);
    return { ...d,
      currentVal: cv,
      gainAmt: cv - d.pp,
      gainPct: (cv - d.pp) / d.pp * 100,
      rate: MARKET_DATA[d.id].annualPct,
      note: MARKET_DATA[d.id].note,
    };
  });

  const totalPP         = D.reduce((s,d) => s + d.pp, 0);
  const totalCurrentVal = currentVals.reduce((s,d) => s + d.currentVal, 0);
  const totalGain       = totalCurrentVal - totalPP;
  const totalRemaining  = D.reduce((s,d) => s + MORTGAGE_DATA[d.id].loanAmt - MORTGAGE_DATA[d.id].tilgungPaid, 0);

  // KPI row
  const r1 = document.createElement('div');
  r1.className='grid g4'; r1.style.marginBottom='12px';
  r1.innerHTML = [
    kpiCard('Total Purchase Cost', fe(totalPP), 'Sum of all purchase prices', '#f9fafb'),
    kpiCard('Est. Current Value', fe(Math.round(totalCurrentVal)), 'April 2026 (model)', '#60a5fa', true),
    kpiCard('Est. Unrealised Gain', fe(Math.round(totalGain)), fp(totalGain/totalPP*100,1)+' vs cost', vc(totalGain), true),
    kpiCard('Est. Real Equity', fe(Math.round(totalCurrentVal-totalRemaining)), 'Value − remaining debt', '#34d399', true),
  ].join('');
  sec.appendChild(r1);

  // Assumptions banner
  const assump = document.createElement('div');
  assump.style.cssText='background:#1c2535;border:1px solid #fbbf24;border-radius:8px;padding:12px;margin-bottom:16px;font-size:11px;color:#d1d5db';
  assump.innerHTML='<span style="color:#fbbf24;font-weight:700">⚠ Model projections — not appraisals.</span> '
    +'Appreciation rates are assumptions based on market context. Actual values depend on market conditions, property condition, and local demand.<br>'
    +'<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:14px">'
    +currentVals.map(d=>`<span><b style="color:#d1d5db">${d.name}</b>: <span style="color:#a78bfa">${d.rate}%/yr</span> — ${d.note}</span>`).join('')
    +'</div>';
  sec.appendChild(assump);

  // Line chart
  const lcCard = document.createElement('div');
  lcCard.className='card chart-wrap'; lcCard.style.marginBottom='16px';
  lcCard.innerHTML='<div class="chart-title">Property Value Development — Purchase to 2031 (€)</div>'
    +'<div class="chart-sub">Solid = estimated historical appreciation. Dashed = projected. Yellow line = April 2026. Hover data points for values.</div>';

  const YEAR_MIN = 2020, YEAR_MAX = 2031;
  const propColors = ['#60a5fa','#34d399','#f97316','#a78bfa','#f87171'];

  const series = D.map((d,i) => ({
    name: d.name, color: propColors[i],
    points: (() => {
      const pts = [];
      for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
        const v = getValueAtYear(d, y);
        if (v !== null) pts.push({x:y, y:Math.round(v), projected: y >= 2026});
      }
      return pts;
    })(),
  }));

  // Portfolio total series
  const portPoints = [];
  for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
    const tot = D.reduce((s,d) => { const v=getValueAtYear(d,y); return v!==null?s+v:s; }, 0);
    if (tot > 0) portPoints.push({x:y, y:Math.round(tot), projected: y >= 2026});
  }
  series.push({name:'Portfolio', color:'#f9fafb', thick:true, points:portPoints});

  lcCard.appendChild(makeLineChart({series, W:940, H:280, ml:72, mr:100}));
  { const leg = document.createElement('div'); leg.className='legend';
    [...D.map((d,i)=>({name:d.name,color:propColors[i]})), {name:'Portfolio',color:'#f9fafb'}]
      .forEach(s => { const div=document.createElement('div'); div.className='leg-item';
        div.innerHTML=`<div class="leg-dot" style="background:${s.color}"></div>${s.name}`;
        leg.appendChild(div); });
    lcCard.appendChild(leg); }
  sec.appendChild(lcCard);

  // Value table
  const tCard = document.createElement('div');

  tCard.innerHTML='<div class="chart-title" style="margin-bottom:10px">Market Value Estimates</div>';
  let html = `<table><thead><tr>

    <th>Gain € (unrealised)</th>
    <th>Gain %</th>
    <th>Remaining Debt</th>
    <th>Est. Real Equity</th>
    <th>Est. Value 2031</th>
    <th>2031 Gain €</th>
  </tr></thead><tbody>`;

      <td style="color:#f87171">${fe(Math.round(remaining))}</td>
      <td style="color:#34d399;font-weight:600">${fe(Math.round(realEquity))}</td>
      <td style="color:#818cf8">${fe(Math.round(val2031))}</td>
      <td style="color:${vc(gain2031)}">${fe(Math.round(gain2031))}</td>
    </tr>`;
  });

  const totalRealEquity = totalCurrentVal - totalRemaining;
  const totalVal2031    = D.reduce((s,d)=>s+getValueAtYear(d,2031),0);
  const totalGain2031   = totalVal2031 - totalPP;
  html += `<tr class="total">
    <td class="left">PORTFOLIO</td>
    <td style="color:#9ca3af">—</td>
    <td>${fe(totalPP)}</td>
    <td style="color:#9ca3af">—</td>
    <td style="color:#60a5fa;font-weight:600">${fe(Math.round(totalCurrentVal))}</td>
    <td style="color:${vc(totalGain)}">${fe(Math.round(totalGain))}</td>
    <td style="color:${vc(totalGain/totalPP*100)};font-weight:600">${fp(totalGain/totalPP*100,1)}</td>
    <td style="color:#f87171">${fe(Math.round(totalRemaining))}</td>
    <td style="color:#34d399;font-weight:600">${fe(Math.round(totalRealEquity))}</td>
    <td style="color:#818cf8">${fe(Math.round(totalVal2031))}</td>
    <td style="color:${vc(totalGain2031)}">${fe(Math.round(totalGain2031))}</td>
  </tr></tbody></table>`;
  tCard.innerHTML += html;
  sec.appendChild(tCard);

  const fn = document.createElement('div');
  fn.className='footnotes';
  fn.innerHTML = `
    <b>Est. Real Equity</b> = Estimated current value − remaining mortgage balance. Pre-tax estimate of what you'd net if you sold today (before transaction costs).<br>
    <b>Appreciation Assumptions:</b> Berlin 1.0%/yr (post-2024 correction), Frankfurt 1.5%/yr (stabilizing), Eschweiler 0.5%/yr (stable small city), Leipzig 2.0%/yr (moderate growth).<br>
    All projections use continuous compound growth from the purchase date at the assumed annual rate. They are illustrative — not market appraisals.`;
  sec.appendChild(fn);
}

function renderBreakEven() {
  const sec = document.getElementById('break-even');
  const NOW_FRAC = 2026 + 3/12;
  const PROP_COLORS = {
    berlin:'#60a5fa', eschweiler:'#34d399', huegelstr:'#f59e0b', ohmstr:'#f87171', leipzig:'#a78bfa'
  };

  function cumRepairsFor(id) {
    if (id === '_portfolio') {
      return Object.keys(REPAIRS).reduce((s,k) => s + (REPAIRS[k]||[]).reduce((s2,r) => s2+(r.amt||0), 0), 0);
    }
    return (REPAIRS[id]||[]).reduce((s,r) => s+(r.amt||0), 0);
  }

  function makeBeItems(model) {
    return D.map(d => ({ id:d.id, name:d.name, color:PROP_COLORS[d.id], model:model[d.id] }));
  }

  function makeBeTable(beItems, model) {
    const wrap = document.createElement('div');
    wrap.style.overflowX = 'auto';
    let html = '<table style="margin-top:8px"><thead><tr>'
      +'<th class="left">Property</th>'
      +'<th>Break-Even</th>'
      +'<th>KNK</th>'
      +'<th>Repair &amp; Maint.</th>'
      +'<th>Equity Paid In</th>'
      +'<th>Total Capital</th>'
      +'<th>Return<br><span style="font-weight:400;color:#6b7280">Apr 2026</span></th>'
      +'<th>Progress</th>'
      +'</tr></thead><tbody>';

    beItems.forEach(d => {
      const m = model[d.id];
      const cr = cumRepairsFor(d.id);
      const eq = EQUITY_PAID[d.id] || 0;
      const tc = BE_MODEL[d.id].knk + cr + eq;
      const posNow = beCumAtFrac(m, NOW_FRAC);
      const pct = tc > 0 ? Math.max(0, Math.min(100, 100 * (1 + posNow / tc))) : 0;
      const barPct = pct.toFixed(0);
      const progBar = `<div style="background:#374151;border-radius:4px;height:8px;width:100%;min-width:80px">`
        +`<div style="background:${pct>=100?'#34d399':'#60a5fa'};width:${barPct}%;height:8px;border-radius:4px"></div>`
        +`</div><span style="font-size:9px;color:#9ca3af">${barPct}%</span>`;
      const beStr = m.be != null
        ? `<span style="color:${m.be<=NOW_FRAC?'#34d399':'#9ca3af'}">${formatFrac(m.be)}${m.be<=NOW_FRAC?' ✓':''}</span>`
        : `<span style="color:#9ca3af">&gt;2060</span>`;
      html += `<tr>
        <td class="left" style="color:${PROP_COLORS[d.id]}">${d.name}</td>
        <td>${beStr}</td>
        <td style="color:#f59e0b;cursor:help"
            onmouseenter="showKNKDetailTooltip(event,'${d.id}')"
            onmousemove="moveTooltip(event)" onmouseleave="hideTooltip()">${fe(BE_MODEL[d.id].knk,2)}</td>
        <td style="cursor:help" onmouseenter="showRepairDetailTooltip(event,'${d.id}',null)"
            onmousemove="moveTooltip(event)" onmouseleave="hideTooltip()">${fe(cr,2)}</td>
        <td style="color:#9ca3af">${eq>0?fe(eq):'—'}</td>
        <td style="color:#fbbf24;font-weight:600">${fe(Math.round(tc))}</td>
        <td style="color:${vc(posNow)};font-weight:600">${fe(Math.round(posNow))}</td>
        <td style="min-width:100px">${progBar}</td>
      </tr>`;
    });

    // Portfolio row
    const pm = model['_portfolio'];
    const portCR = cumRepairsFor('_portfolio');
    const portEq = EQUITY_PAID['_portfolio'] || 0;
    const portKNK = BE_MODEL['_portfolio'].knk;
    const portTC = portKNK + portCR + portEq;
    const portPos = beCumAtFrac(pm, NOW_FRAC);
    const portPct = portTC > 0 ? Math.max(0, Math.min(100, 100*(1+portPos/portTC))) : 0;
    const portBar = `<div style="background:#374151;border-radius:4px;height:8px;width:100%;min-width:80px">`
      +`<div style="background:${portPct>=100?'#34d399':'#60a5fa'};width:${portPct.toFixed(0)}%;height:8px;border-radius:4px"></div>`
      +`</div><span style="font-size:9px;color:#9ca3af">${portPct.toFixed(0)}%</span>`;
    const portBEStr = pm.be != null ? formatFrac(pm.be) : '>2060';
    html += `<tr class="total">
      <td class="left">PORTFOLIO</td>
      <td style="color:#9ca3af">${portBEStr}</td>
      <td style="color:#f59e0b">${fe(Math.round(portKNK))}</td>
      <td style="color:#9ca3af">${fe(Math.round(portCR))}</td>
      <td style="color:#9ca3af">${fe(portEq)}</td>
      <td style="color:#fbbf24;font-weight:600">${fe(Math.round(portTC))}</td>
      <td style="color:${vc(portPos)};font-weight:600">${fe(Math.round(portPos))}</td>
      <td style="min-width:100px">${portBar}</td>
    </tr></tbody></table>`;
    wrap.innerHTML = html;
    return wrap;
  }

  // Compute shared X range across both models so the charts are directly comparable
  const allItems = [...makeBeItems(BE_TILT_MODEL), ...makeBeItems(BE_TOTAL_MODEL)];
  const sharedMinX = Math.floor(Math.min(...allItems.map(it => it.model.pts[0].y)));
  const allBE = allItems.filter(it => it.model.be != null && it.model.be < 2060).map(it => it.model.be);
  const sharedMaxBE = allBE.length ? Math.max(...allBE) : NOW_FRAC;
  const sharedMaxX = Math.ceil(Math.max(sharedMaxBE, NOW_FRAC) + 1.5);

  // ── Chart 1: BE_TILT_MODEL — KNK vs. CF + Tilgung ──────────────────────────
  const c1 = document.createElement('div');
  c1.className = 'card chart-wrap'; c1.style.marginBottom = '16px';
  c1.innerHTML = '<div class="chart-title">Break-Even: KNK vs. CF + Tilgung</div>'
    +'<div class="chart-sub">Each line shows cumulative return (Op CF + Tilgung as equity) minus Kaufnebenkosten. '
    +'Tilgung counts as return — it is equity you own. Crossing y = 0 (green line) = break-even. '
    +'Solid = historical (CSV through 2025), dashed = projected from 2026. Filled circle = break-even date. '
    +'Forward assumptions: rent +2%/yr, Hausgeld +2%/yr, refi at current rates, vacancy 3% Eschweiler / 0% rest, Rücklage 10 €/m²/yr.</div>';
  const beItems1 = makeBeItems(BE_TILT_MODEL);
  c1.appendChild(makeBreakEvenChart({items:beItems1, W:900, xMin:sharedMinX, xMax:sharedMaxX}));
  c1.appendChild(makeBeTable(beItems1, BE_TILT_MODEL));
  sec.appendChild(c1);

  // ── Chart 2: BE_TOTAL_MODEL — CF + Tilgung vs. Total Capital Employed ───────
  const c2 = document.createElement('div');
  c2.className = 'card chart-wrap'; c2.style.marginBottom = '16px';
  c2.innerHTML = '<div class="chart-title">Break-Even: CF + Tilgung vs. Total Capital Employed</div>'
    +'<div class="chart-sub">Each line shows cumulative return (Op CF + Tilgung) minus all capital invested: '
    +'Kaufnebenkosten + repair/maintenance costs + initial equity payments. '
    +'Repairs flow through Op CF (already reducing the cumulative); equity is additional own capital deployed at purchase. '
    +'The chart starts at −(KNK + equity); Total Capital in the table adds cumulative repairs for a full accounting. '
    +'Solid = historical, dashed = projected. Filled circle = break-even date.</div>';
  const beItems2 = makeBeItems(BE_TOTAL_MODEL);
  c2.appendChild(makeBreakEvenChart({items:beItems2, W:900, xMin:sharedMinX, xMax:sharedMaxX}));
  c2.appendChild(makeBeTable(beItems2, BE_TOTAL_MODEL));
  sec.appendChild(c2);
}

// ─── TAB SWITCHING ───────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderOverview();
renderDetail();
renderMortgages();
renderMarketValue();
renderBreakEven();
</script>
</body>
